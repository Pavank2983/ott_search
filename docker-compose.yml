services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: muvi_app

    working_dir: /var/www

    # user: "${UID}:${GID}"

    ports:
      - "5173:5173"

    volumes:
      - ./:/var/www

    depends_on:
      - postgres
      - redis
      - elasticsearch

    networks:
      - muvi_network

  nginx:
    image: nginx:latest

    container_name: muvi_nginx

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - muvi_network

  postgres:
    image: postgres:16

    container_name: muvi_postgres

    environment:
      POSTGRES_DB: muvi_ott
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - muvi_network

  redis:
    image: redis:7

    container_name: muvi_redis

    ports:
      - "6379:6379"

    networks:
      - muvi_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4

    container_name: muvi_elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    networks:
      - muvi_network

volumes:
  postgres_data:
  elasticsearch_data:

networks:
  muvi_network:
